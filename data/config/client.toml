# Step 1: Create the volume
docker volume create mezo_data

# Step 2: Initialize the node (generates all config files)
docker run --rm \
  -v mezo_data:/root/.mezod \
  us-central1-docker.pkg.dev/mezo-test-420708/mezo-staging-docker-public/mezod:latest \
  mezod init 'my-validator' \
    --chain-id mezo_31611-1 \
    --home /root/.mezod

# Step 3: Update client.toml with correct values
docker run --rm \
  -v mezo_data:/root/.mezod \
  us-central1-docker.pkg.dev/mezo-test-420708/mezo-staging-docker-public/mezod:latest \
  sh -c "cat > /root/.mezod/config/client.toml << 'EOF'
# This is a TOML config file.
# For more information, see https://github.com/toml-lang/toml

###############################################################################
###                           Client Configuration                           ###
###############################################################################

# The network chain ID
chain-id = \"mezo_31611-1\"
# The keyring's backend, where the keys are stored (os|file|kwallet|pass|test|memory)
keyring-backend = \"file\"
# CLI output format (text|json)
output = \"text\"
# <host>:<port> to CometBFT RPC interface for this chain
node = \"tcp://localhost:26657\"
# Transaction broadcasting mode (sync|async)
broadcast-mode = \"sync\"
EOF"

# Step 4: Add validator key (interactive - will prompt for keyring passphrase)
docker run --rm -it \
  -v mezo_data:/root/.mezod \
  us-central1-docker.pkg.dev/mezo-test-420708/mezo-staging-docker-public/mezod:latest \
  mezod keys add my-validator-key \
    --home /root/.mezod \
    --keyring-backend file

# Step 5: Verify the key was added
docker run --rm -it \
  -v mezo_data:/root/.mezod \
  us-central1-docker.pkg.dev/mezo-test-420708/mezo-staging-docker-public/mezod:latest \
  mezod keys list \
    --home /root/.mezod \
    --keyring-backend file
