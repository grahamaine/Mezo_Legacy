image:
  repository: mezod-image # Verify if this should be a full URL like 'public.ecr.aws/mezo/mezod'
  tag: "v9.0.0"
  pullPolicy: IfNotPresent

node:
  network: mainnet
  home: /home/nonroot/.mezo
  moniker: "my-validator"

# --- FIX THE ERRORS HERE ---
storage:
  size: 100Gi
  storageClassName: "hostpath"  # Change 'CHANGE_ME' to 'hostpath' for Docker Desktop

credentials:
  secretName: "mezo-credentials" # Change 'YOUR_SECRET_NAME' to the secret you created
# ---------------------------

resources:
  limits:
    cpu: "4"
    memory: "8Gi"
  requests:
    cpu: "2"
    memory: "4Gi"